name: Build NetCDF-C (full-feature-shared)
on:
  workflow_dispatch:
    inputs:
      netcdf_tag:
        description: "Tag/version of Unidata/netcdf-c build (e.g., v4.10.0)"
        required: true

env:
  BUILD_PROFILE: "full-feature-shared"
  ZLIB_VERSION: "1.3.2"
  CURL_VERSION: "8.20.0"
  HDF5_VERSION: "1.14.2"
  NETCDF_TAG: ${{ github.event.inputs.netcdf_tag }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            cmake_arch: x86_64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            cmake_arch: aarch64
          - runner: macos-latest
            os: macos
            arch: arm64
            cmake_arch: arm64
          - runner: windows-latest
            os: windows
            arch: x64
            cmake_arch: x64
#          Outdated and runners take too long to start (not even sure if it will build)
#          - runner: macos‑15‑intel
#            os: macos
#            arch: x64
#            cmake_arch: x86_64
#          Windows ARM64 disabled — HDF5 cannot be built
#          - runner: windows-latest
#            os: windows
#            arch: arm64
#            cmake_arch: ARM64

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Clone Unidata/netcdf-c
        shell: bash
        run: |
          git clone --depth 1 --branch "$NETCDF_TAG" https://github.com/Unidata/netcdf-c.git netcdf-c

      - name: Prepare build folders
        shell: bash
        run: |
          mkdir -p build/hdf5 build/netcdf

      ###########################################################################
      # ZLIB BUILD
      ###########################################################################          

      - name: Build zlib (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
      
          curl -sSLf "https://github.com/madler/zlib/archive/refs/tags/v${ZLIB_VERSION}.tar.gz" -o zlib.tar.gz
          mkdir -p zlib-src
          tar -xf zlib.tar.gz -C zlib-src --strip-components=1
      
          mkdir -p zlib-build
          cd zlib-build
      
          cmake ../zlib-src \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DZLIB_BUILD_SHARED=ON \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            --log-level=WARNING
      
          cmake --build . --target install -- -s
      
          echo "ZLIB_ROOT=$PWD/install" >> $GITHUB_ENV
          echo "ZLIB_DIR=$PWD/install/lib/cmake/zlib" >> $GITHUB_ENV
          echo "ZLIB_INCLUDE=$PWD/install/include" >> $GITHUB_ENV
      
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "ZLIB_LIBRARY=$PWD/install/lib/libz.so" >> $GITHUB_ENV
            echo "ZLIB_STATIC_LIBRARY=$PWD/install/lib/libz.a" >> $GITHUB_ENV
            echo "ZLIB_SHARED_LIBRARY=$PWD/install/lib/libz.so" >> $GITHUB_ENV
          else
            echo "ZLIB_LIBRARY=$PWD/install/lib/libz.dylib" >> $GITHUB_ENV
            echo "ZLIB_STATIC_LIBRARY=$PWD/install/lib/libz.a" >> $GITHUB_ENV
            echo "ZLIB_SHARED_LIBRARY=$PWD/install/lib/libz.dylib" >> $GITHUB_ENV
          fi    

      - name: Build zlib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
      
          $url = "https://github.com/madler/zlib/archive/refs/tags/v$env:ZLIB_VERSION.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile "zlib.tar.gz"          
          mkdir zlib-src | Out-Null
          tar -xf zlib.tar.gz -C zlib-src --strip-components=1
      
          New-Item -ItemType Directory -Force -Path zlib-build | Out-Null
          Set-Location zlib-build
          $installPrefix = "$PWD\install"
          $installPrefixCMake = $installPrefix -replace '\\','/'

          cmake ../zlib-src -A x64 `
            "-DBUILD_SHARED_LIBS=ON" `
            "-DCMAKE_BUILD_TYPE=Release" `
            "--log-level=WARNING"

          cmake --build . --config Release -- /verbosity:quiet /nologo
          cmake --install . --config Release --prefix $installPrefix

          $zlibStaticLibCandidates = @(
            "$installPrefix\lib\zs.lib",
            "$installPrefix\lib\zlibstatic.lib",
            "$installPrefix\lib\zlib.lib"
          )
          $zlibStaticLib = $zlibStaticLibCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $zlibStaticLib) {
            Get-ChildItem -LiteralPath "$installPrefix\lib" -ErrorAction SilentlyContinue
            throw "Could not find installed zlib static library under $installPrefix\lib"
          }
          $zlibSharedImportCandidates = @(
            "$installPrefix\lib\zlib.lib",
            "$installPrefix\lib\z.lib"
          )
          $zlibSharedImportLib = $zlibSharedImportCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $zlibSharedImportLib) {
            Get-ChildItem -LiteralPath "$installPrefix\lib" -ErrorAction SilentlyContinue
            throw "Could not find installed zlib shared import library under $installPrefix\lib"
          }
          $zlibDllCandidates = @(
            (Join-Path $installPrefix "bin\zlib1.dll"),
            (Join-Path $installPrefix "bin\zlib.dll")
          )
          $zlibDll = $zlibDllCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $zlibDll -or -not (Test-Path -LiteralPath $zlibDll)) {
            Get-ChildItem -LiteralPath "$installPrefix\bin" -ErrorAction SilentlyContinue
            throw "Could not find installed zlib runtime DLL under $installPrefix\bin"
          }
          $zlibSharedImportLibCMake = $zlibSharedImportLib -replace '\\','/'
          $zlibStaticLibCMake = $zlibStaticLib -replace '\\','/'
          $zlibDllCMake = $zlibDll -replace '\\','/'

          echo "ZLIB_ROOT=$installPrefixCMake" >> $env:GITHUB_ENV
          echo "ZLIB_DIR=$installPrefixCMake/lib/cmake/zlib" >> $env:GITHUB_ENV
          echo "ZLIB_INCLUDE=$installPrefixCMake/include" >> $env:GITHUB_ENV
          echo "ZLIB_LIBRARY=$zlibSharedImportLibCMake" >> $env:GITHUB_ENV
          echo "ZLIB_STATIC_LIBRARY=$zlibStaticLibCMake" >> $env:GITHUB_ENV
          echo "ZLIB_SHARED_LIBRARY=$zlibSharedImportLibCMake" >> $env:GITHUB_ENV
          echo "ZLIB_DLL=$zlibDllCMake" >> $env:GITHUB_ENV

      ###########################################################################
      # CURL BUILD
      ###########################################################################
      
      - name: Build curl (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
      
          curl -sSL "https://curl.se/download/curl-$CURL_VERSION.tar.gz" -o curl.tar.gz
          mkdir -p curl-src
          tar -xf curl.tar.gz -C curl-src --strip-components=1
      
          mkdir -p curl-build
          cd curl-build
      
          TLS_BACKEND="-DCURL_USE_OPENSSL=ON"
      
          cmake ../curl-src \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCURL_USE_LIBPSL=OFF \
            -DCURL_ZLIB=OFF \
            -DZLIB_INCLUDE_DIR=$ZLIB_INCLUDE \
            -DZLIB_LIBRARY=$ZLIB_LIBRARY \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            $TLS_BACKEND \
            --log-level=WARNING
      
          cmake --build . --target install -- -s
      
          echo "CURL_ROOT=$PWD/install" >> $GITHUB_ENV
          echo "CURL_DIR=$PWD/install/lib/cmake/CURL" >> $GITHUB_ENV
          echo "CURL_INCLUDE=$PWD/install/include" >> $GITHUB_ENV
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "CURL_LIBRARY=$PWD/install/lib/libcurl.so" >> $GITHUB_ENV
            echo "CURL_SHARED_LIBRARY=$PWD/install/lib/libcurl.so" >> $GITHUB_ENV
          else
            echo "CURL_LIBRARY=$PWD/install/lib/libcurl.dylib" >> $GITHUB_ENV
            echo "CURL_SHARED_LIBRARY=$PWD/install/lib/libcurl.dylib" >> $GITHUB_ENV
          fi


      - name: Build curl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
      
          $url = "https://curl.se/download/curl-$env:CURL_VERSION.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile "curl.tar.gz"
          
          # Correct: extract .tar.gz using tar, not Expand-Archive
          tar -xf curl.tar.gz
          Rename-Item "curl-$env:CURL_VERSION" curl-src
      
          New-Item -ItemType Directory -Force -Path curl-build | Out-Null
          Set-Location curl-build
          $curlInstallPrefix = ("$PWD\install" -replace '\\','/')
      
          cmake ../curl-src -A x64 `
            "-DBUILD_SHARED_LIBS=ON" `
            "-DCURL_USE_SCHANNEL=ON" `
            "-DCURL_USE_OPENSSL=OFF" `
            "-DCURL_USE_LIBPSL=OFF" `
            "-DCURL_ZLIB=OFF" `
            "-DZLIB_INCLUDE_DIR=$env:ZLIB_INCLUDE" `
            "-DZLIB_LIBRARY=$env:ZLIB_LIBRARY" `
            "-DCMAKE_INSTALL_PREFIX=$curlInstallPrefix" `
            "-DCMAKE_BUILD_TYPE=Release" `
            "--log-level=WARNING"
      
          cmake --build . --config Release --target install -- /verbosity:quiet /nologo

          $curlImportLibCandidates = @(
            "$PWD\install\lib\libcurl_imp.lib",
            "$PWD\install\lib\libcurl.lib"
          )
          $curlImportLib = $curlImportLibCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $curlImportLib) {
            Get-ChildItem -LiteralPath "$PWD\install\lib" -ErrorAction SilentlyContinue
            throw "Could not find installed curl import library"
          }
          $curlDll = "$PWD\install\bin\libcurl.dll"
          if (-not (Test-Path -LiteralPath $curlDll)) {
            Get-ChildItem -LiteralPath "$PWD\install\bin" -ErrorAction SilentlyContinue
            throw "Could not find installed curl runtime DLL"
          }
          $curlImportLibCMake = $curlImportLib -replace '\\','/'
          $curlDllCMake = $curlDll -replace '\\','/'

          echo "CURL_ROOT=$curlInstallPrefix" >> $env:GITHUB_ENV
          echo "CURL_DIR=$curlInstallPrefix/lib/cmake/CURL" >> $env:GITHUB_ENV
          echo "CURL_INCLUDE=$curlInstallPrefix/include" >> $env:GITHUB_ENV
          echo "CURL_LIBRARY=$curlImportLibCMake" >> $env:GITHUB_ENV
          echo "CURL_SHARED_LIBRARY=$curlImportLibCMake" >> $env:GITHUB_ENV
          echo "CURL_DLL=$curlDllCMake" >> $env:GITHUB_ENV

      ###########################################################################
      # HDF5 SERIAL BUILD
      ###########################################################################

      - name: Build HDF5 (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: build/hdf5
        run: |
          set -e
          wget -q -O hdf5.tar.gz \
            https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1_14_${HDF5_VERSION##*.}.tar.gz
          mkdir src && tar xf hdf5.tar.gz --strip-components=1 -C src
          mkdir build && cd build
          cmake ../src -G Ninja "--log-level=WARNING"\
            -DBUILD_SHARED_LIBS=ON \
            -DHDF5_BUILD_TOOLS=OFF \
            -DBUILD_TESTING=OFF \
            -DHDF5_BUILD_TESTING=OFF \
            -DHDF5_BUILD_EXAMPLES=OFF \
            -DHDF5_BUILD_HL_TOOLS=OFF \
            -DHDF5_ENABLE_Z_LIB_SUPPORT=ON \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_PREFIX_PATH="$ZLIB_ROOT" \
            -DZLIB_ROOT=$ZLIB_ROOT \
            -DZLIB_DIR=$ZLIB_DIR \
            -DZLIB_INCLUDE_DIR=$ZLIB_INCLUDE \
            -DZLIB_LIBRARY=$ZLIB_LIBRARY \
            -DZLIB_LIBRARIES=$ZLIB_LIBRARY \
            -DZLIB_STATIC_LIBRARY=$ZLIB_STATIC_LIBRARY \
            -DZLIB_SHARED_LIBRARY=$ZLIB_SHARED_LIBRARY \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          cmake --install . --prefix install

      - name: Build HDF5 (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: build/hdf5
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1_14_$($env:HDF5_VERSION.Split('.')[2]).tar.gz" -OutFile hdf5.tar.gz
          New-Item -ItemType Directory -Force -Path src | Out-Null
          tar -xf hdf5.tar.gz -C src --strip-components=1
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake ../src -A ${{ matrix.cmake_arch }} "--log-level=WARNING"`
            "-DBUILD_SHARED_LIBS=ON" `
            "-DHDF5_BUILD_TOOLS=OFF" `
            "-DBUILD_TESTING=OFF" `
            "-DHDF5_BUILD_TESTING=OFF" `
            "-DHDF5_BUILD_EXAMPLES=OFF" `
            "-DHDF5_BUILD_HL_TOOLS=OFF" `
            "-DHDF5_ENABLE_Z_LIB_SUPPORT=ON" `
            "-DCMAKE_PREFIX_PATH=$env:ZLIB_ROOT" `
            "-DZLIB_ROOT=$env:ZLIB_ROOT" `
            "-DZLIB_DIR=$env:ZLIB_DIR" `
            "-DZLIB_INCLUDE_DIR=$env:ZLIB_INCLUDE" `
            "-DZLIB_LIBRARY=$env:ZLIB_LIBRARY" `
            "-DZLIB_LIBRARIES=$env:ZLIB_LIBRARY" `
            "-DZLIB_STATIC_LIBRARY=$env:ZLIB_STATIC_LIBRARY" `
            "-DZLIB_SHARED_LIBRARY=$env:ZLIB_SHARED_LIBRARY" `
            "-DCMAKE_INSTALL_PREFIX=$PWD/install" `
            "-DCMAKE_BUILD_TYPE=Release"
          cmake --build . --config Release --target install -- /verbosity:minimal

      ###########################################################################
      # NETCDF-C SERIAL BUILD
      ###########################################################################

      - name: Build netCDF-C (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: netcdf-c
        run: |
          set -e
          export PATH="${{ github.workspace }}/build/hdf5/build/install/bin:$PATH"
          export CPATH="$CURL_INCLUDE${CPATH:+:$CPATH}"
          export LIBRARY_PATH="$CURL_ROOT/lib${LIBRARY_PATH:+:$LIBRARY_PATH}"
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DNETCDF_ENABLE_HDF5=ON \
            -DHDF5_ROOT="${{ github.workspace }}/build/hdf5/build/install" \
            -DNETCDF_ENABLE_DAP=ON \
            -DNETCDF_ENABLE_NCZARR=ON \
            -DNETCDF_ENABLE_BYTERANGE=ON \
            -DCMAKE_FIND_PACKAGE_PREFER_CONFIG=OFF \
            -DCMAKE_PREFIX_PATH="$CURL_ROOT;$ZLIB_ROOT;${{ github.workspace }}/build/hdf5/build/install" \
            -DCURL_ROOT="$CURL_ROOT" \
            -DCURL_DIR="$CURL_DIR" \
            -DCURL_INCLUDE_DIR=$CURL_INCLUDE \
            -DCURL_INCLUDE_DIRS=$CURL_INCLUDE \
            -DCURL_LIBRARY=$CURL_LIBRARY \
            -DZLIB_INCLUDE_DIR=$ZLIB_INCLUDE \
            -DZLIB_LIBRARY=$ZLIB_LIBRARY \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_BUILD_TYPE=Release          
          cmake --build . --config Release -- -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
          cmake --install . --prefix install

      - name: Build netCDF-C (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: netcdf-c
        run: |
          $ErrorActionPreference = "Stop"
          $workspaceCMake = $env:GITHUB_WORKSPACE -replace '\\','/'
          $hdf5Root = "$workspaceCMake/build/hdf5/build/install"
          $curlRootNative = $env:CURL_ROOT -replace '/','\'
          $curlIncludeNative = $env:CURL_INCLUDE -replace '/','\'
          $env:PATH = "$($hdf5Root -replace '/','\')\bin;$env:PATH"
          $env:INCLUDE = "$curlIncludeNative;$env:INCLUDE"
          $env:LIB = "$curlRootNative\lib;$env:LIB"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake .. -A ${{ matrix.cmake_arch }} "--log-level=WARNING"`
            "-DBUILD_SHARED_LIBS=ON" `
            "-DNETCDF_ENABLE_HDF5=ON" `
            "-DNETCDF_ENABLE_TESTS=OFF" `
            "-DHDF5_ROOT=$hdf5Root" `
            "-DNETCDF_ENABLE_DAP=ON" `
            "-DNETCDF_ENABLE_NCZARR=ON" `
            "-DNETCDF_ENABLE_BYTERANGE=ON" `
            "-DCMAKE_FIND_PACKAGE_PREFER_CONFIG=OFF" `
            "-DCMAKE_C_FLAGS=/I$env:CURL_INCLUDE" `
            "-DCMAKE_PREFIX_PATH=$env:CURL_ROOT;$env:ZLIB_ROOT;$hdf5Root" `
            "-DCURL_ROOT=$env:CURL_ROOT" `
            "-DCURL_DIR=$env:CURL_DIR" `
            "-DCURL_INCLUDE_DIR=$env:CURL_INCLUDE" `
            "-DCURL_INCLUDE_DIRS=$env:CURL_INCLUDE" `
            "-DCURL_LIBRARY=$env:CURL_LIBRARY" `
            "-DZLIB_LIBRARY=$env:ZLIB_LIBRARY" `
            "-DZLIB_INCLUDE_DIR=$env:ZLIB_INCLUDE" `
            "-DCMAKE_INSTALL_PREFIX=$PWD/install" `
            "-DCMAKE_BUILD_TYPE=Release"
          cmake --build . --config Release -- /m /verbosity:normal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --install . --config Release --prefix "$PWD/install"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      ###########################################################################
      # PACKAGE ARTIFACTS
      ###########################################################################

      - name: Package artifacts (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          STAGE_DIR="$PWD/artifacts/stage"
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"
          cp -a netcdf-c/build/install/. "$STAGE_DIR/"
          mkdir -p "$STAGE_DIR/lib"

          if [[ "${{ matrix.os }}" == "linux" ]]; then
            find curl-build/install/lib -maxdepth 1 -type f -name "libcurl.so*" -exec cp -a {} "$STAGE_DIR/lib/" \;
            find build/hdf5/build/install/lib -maxdepth 1 -type f -name "libhdf5*.so*" -exec cp -a {} "$STAGE_DIR/lib/" \;
            find zlib-build/install/lib -maxdepth 1 -type f -name "libz.so*" -exec cp -a {} "$STAGE_DIR/lib/" \;
          else
            find curl-build/install/lib -maxdepth 1 -type f -name "libcurl*.dylib" -exec cp -a {} "$STAGE_DIR/lib/" \;
            find build/hdf5/build/install/lib -maxdepth 1 -type f -name "libhdf5*.dylib" -exec cp -a {} "$STAGE_DIR/lib/" \;
            find zlib-build/install/lib -maxdepth 1 -type f -name "libz*.dylib" -exec cp -a {} "$STAGE_DIR/lib/" \;
          fi

          tar -czf artifacts/netcdf-${NETCDF_TAG}-${BUILD_PROFILE}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz -C "$STAGE_DIR" .

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $stageDir = Join-Path $PWD "artifacts\stage"
          if (Test-Path -LiteralPath $stageDir) { Remove-Item -LiteralPath $stageDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          Copy-Item -Path "netcdf-c\build\install\*" -Destination $stageDir -Recurse -Force
          $stageBin = Join-Path $stageDir "bin"
          New-Item -ItemType Directory -Force -Path $stageBin | Out-Null

          $runtimeDllDirs = @(
            "curl-build\install\bin",
            "build\hdf5\build\install\bin",
            "zlib-build\install\bin"
          )
          foreach ($dllDir in $runtimeDllDirs) {
            if (Test-Path -LiteralPath $dllDir) {
              Get-ChildItem -LiteralPath $dllDir -Filter *.dll -File | ForEach-Object {
                Copy-Item -LiteralPath $_.FullName -Destination $stageBin -Force
              }
            }
          }

          $artifactPath = "artifacts/netcdf-$env:NETCDF_TAG-$env:BUILD_PROFILE-${{ matrix.os }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$stageDir/*" -DestinationPath $artifactPath

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netcdf-${{ env.BUILD_PROFILE }}-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Recreate release tag
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -d "$NETCDF_TAG" 2>/dev/null || true
          git push origin ":refs/tags/$NETCDF_TAG" 2>/dev/null || true
          git tag "$NETCDF_TAG" "$GITHUB_SHA" -f
          git push origin "refs/tags/$NETCDF_TAG" --force

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NETCDF_TAG }}
          overwrite_files: true
          files: downloaded/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
