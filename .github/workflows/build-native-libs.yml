name: Build netCDF-C (netCDF-4 + Parallel) from Unidata tag and attach to release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      unidata_tag:
        description: 'Unidata/netcdf-c tag to build (e.g. v4.9.0). If empty, uses pushed tag.'
        required: false
        default: ''
      hdf5_version:
        description: 'HDF5 version to build (e.g. 1.14.2)'
        required: false
        default: '1.14.2'
      pnetcdf_version:
        description: 'PnetCDF version to build (e.g. 1.14.2)'
        required: false
        default: '1.14.2'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            cmake_arch: x86_64
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            cmake_arch: aarch64
          - runner: macos-latest
            os: macos
            arch: x64
            cmake_arch: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            cmake_arch: arm64
          - runner: windows-latest
            os: windows
            arch: x64
            cmake_arch: x64
          - runner: windows-latest
            os: windows
            arch: arm64
            cmake_arch: ARM64

    env:
      HDF5_VERSION: ${{ github.event.inputs.hdf5_version || '1.14.2' }}
      PNETCDF_VERSION: ${{ github.event.inputs.pnetcdf_version || '1.14.2' }}
      # Choose Unidata tag: prefer workflow input, otherwise use the pushed tag name
      UNIDATA_TAG: ${{ github.event.inputs.unidata_tag || github.ref_name }}

    steps:
      - name: Checkout this repository (workflow)
        uses: actions/checkout@v4

      - name: Show chosen versions
        run: |
          echo "Unidata tag: $UNIDATA_TAG"
          echo "HDF5 version: $HDF5_VERSION"
          echo "PnetCDF version: $PNETCDF_VERSION"

      - name: Fetch Unidata/netcdf-c at tag
        run: |
          set -e
          echo "Cloning Unidata/netcdf-c tag: $UNIDATA_TAG"
          rm -rf unidata-netcdf-c
          git clone --depth 1 --branch "$UNIDATA_TAG" https://github.com/Unidata/netcdf-c.git unidata-netcdf-c
          cd unidata-netcdf-c
          git submodule update --init --recursive || true
          echo "Checked out Unidata/netcdf-c at $UNIDATA_TAG"

      - name: Install common tools (Linux/macOS)
        if: matrix.os != 'windows'
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake ninja-build pkg-config wget tar libcurl4-openssl-dev zlib1g-dev libssl-dev
            sudo apt-get install -y libopenmpi-dev openmpi-bin
          else
            brew update
            brew install cmake ninja open-mpi wget pkg-config zlib curl
          fi

      - name: Install MS-MPI and tools on Windows
        if: matrix.os == 'windows'
        run: |
          choco install -y microsoft-mpi
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Build and install HDF5 (parallel)
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/deps
        run: |
          set -e
          mkdir -p $PWD/hdf5-src
          cd $PWD
          wget -q https://support.hdfgroup.org/ftp/HDF5/releases/hdf5-1.14/hdf5-${HDF5_VERSION}/src/hdf5-${HDF5_VERSION}.tar.gz
          tar xf hdf5-${HDF5_VERSION}.tar.gz -C hdf5-src --strip-components=1
          mkdir -p build-hdf5 && cd build-hdf5
          if [ "${{ matrix.os }}" = "windows" ]; then
            cmake ../hdf5-src -A ${{ matrix.cmake_arch }} -DBUILD_SHARED_LIBS=ON -DHDF5_BUILD_TOOLS=ON -DHDF5_ENABLE_PARALLEL=ON -DCMAKE_INSTALL_PREFIX=$PWD/install -DCMAKE_BUILD_TYPE=Release
            cmake --build . --config Release --target install
          else
            cmake ../hdf5-src -G Ninja -DBUILD_SHARED_LIBS=ON -DHDF5_BUILD_TOOLS=ON -DHDF5_ENABLE_PARALLEL=ON -DCMAKE_INSTALL_PREFIX=$PWD/install -DCMAKE_BUILD_TYPE=Release
            cmake --build . --config Release
            cmake --install . --prefix install
          fi
          echo "HDF5 installed to $(pwd)/install"

      - name: Build and install PnetCDF (classic parallel)
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/deps
        run: |
          set -e
          wget -q https://parallel-netcdf.github.io/Release/pnetcdf-${PNETCDF_VERSION}.tar.gz
          tar xf pnetcdf-${PNETCDF_VERSION}.tar.gz
          mkdir -p build-pnetcdf && cd build-pnetcdf
          if [ "${{ matrix.os }}" = "windows" ]; then
            cmake ../pnetcdf-${PNETCDF_VERSION} -A ${{ matrix.cmake_arch }} -DCMAKE_INSTALL_PREFIX=$PWD/install -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=OFF
            cmake --build . --config Release --target install
          else
            cmake ../pnetcdf-${PNETCDF_VERSION} -G Ninja -DCMAKE_INSTALL_PREFIX=$PWD/install -DCMAKE_BUILD_TYPE=Release
            cmake --build . --config Release
            cmake --install . --prefix install
          fi
          echo "PnetCDF installed to $(pwd)/install"

      - name: Configure netCDF-C with HDF5 and Parallel I/O
        working-directory: ${{ github.workspace }}/unidata-netcdf-c
        run: |
          set -e
          mkdir -p build && cd build
          HDF5_ROOT="${{ github.workspace }}/unidata-netcdf-c/deps/build-hdf5/install"
          PNETCDF_ROOT="${{ github.workspace }}/unidata-netcdf-c/deps/build-pnetcdf/install"
          if [ "${{ matrix.os }}" = "windows" ]; then
            cmake .. -A ${{ matrix.cmake_arch }} \
              -DBUILD_SHARED_LIBS=ON \
              -DNETCDF_ENABLE_HDF5=ON \
              -DHDF5_ROOT="$HDF5_ROOT" \
              -DNETCDF_ENABLE_PARALLEL=ON \
              -DPnetCDF_ROOT="$PNETCDF_ROOT" \
              -DCMAKE_INSTALL_PREFIX=$PWD/install \
              -DCMAKE_BUILD_TYPE=Release
          else
            cmake .. -G Ninja \
              -DBUILD_SHARED_LIBS=ON \
              -DNETCDF_ENABLE_HDF5=ON \
              -DHDF5_ROOT="$HDF5_ROOT" \
              -DNETCDF_ENABLE_PARALLEL=ON \
              -DPnetCDF_ROOT="$PNETCDF_ROOT" \
              -DCMAKE_INSTALL_PREFIX=$PWD/install \
              -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build and install netCDF-C
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/build
        run: |
          set -e
          if [ "${{ matrix.os }}" = "windows" ]; then
            cmake --build . --config Release --target install
          else
            cmake --build . --config Release -- -j$(nproc || sysctl -n hw.ncpu)
            cmake --install . --prefix install
          fi

      - name: Package artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cd ${{ github.workspace }}/unidata-netcdf-c/build/install
          if [ "${{ matrix.os }}" = "windows" ]; then
            powershell -Command "Compress-Archive -Path * -DestinationPath $env:GITHUB_WORKSPACE/artifacts/netcdf-${UNIDATA_TAG}-${{ matrix.os }}-${{ matrix.arch }}.zip"
          else
            tar -czf $GITHUB_WORKSPACE/artifacts/netcdf-${UNIDATA_TAG}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz *
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcdf-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Create release (if not exists)
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.unidata_tag || github.ref_name }}
          release_name: ${{ github.event.inputs.unidata_tag || github.ref_name }}
          draft: false
          prerelease: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Upload each artifact to release
        uses: softprops/action-gh-release@v1
        with:
          files: downloaded_artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
