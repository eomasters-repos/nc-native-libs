name: Build netCDF-C (HDF5 serial)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      unidata_tag:
        description: "Tag of Unidata/netcdf-c to build"
        required: false
        default: ""
      hdf5_version:
        description: "HDF5 version (1.14.x only!)"
        required: false
        default: "1.14.2"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            cmake_arch: x86_64
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            cmake_arch: aarch64
          - runner: macos-latest
            os: macos
            arch: x64
            cmake_arch: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            cmake_arch: arm64
          - runner: windows-latest
            os: windows
            arch: x64
            cmake_arch: x64
# Windows ARM64 disabled — HDF5 cannot be built
#          - runner: windows-latest
#            os: windows
#            arch: arm64
#            cmake_arch: ARM64

    env:
      HDF5_VERSION: ${{ github.event.inputs.hdf5_version || '1.14.2' }}
      UNIDATA_TAG: ${{ github.event.inputs.unidata_tag || github.ref_name }}

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Clone Unidata/netcdf-c
        shell: bash
        run: |
          git clone --depth 1 --branch "$UNIDATA_TAG" https://github.com/Unidata/netcdf-c.git netcdf-c

      - name: Prepare build folders
        shell: bash
        run: |
          mkdir -p build/hdf5 build/netcdf

      - name: Install curl dev (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install curl dev (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          brew install curl

      - name: Install curl dev (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install -y curl

      ###########################################################################
      # HDF5 SERIAL BUILD
      ###########################################################################

      - name: Build HDF5 (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: build/hdf5
        run: |
          set -e
          wget -q -O hdf5.tar.gz \
            https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1_14_${HDF5_VERSION##*.}.tar.gz
          mkdir src && tar xf hdf5.tar.gz --strip-components=1 -C src
          mkdir build && cd build
          cmake ../src -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DHDF5_BUILD_TOOLS=ON \
            -DBUILD_TESTING=OFF \
            -DHDF5_BUILD_TESTING=OFF \
            -DHDF5_BUILD_EXAMPLES=OFF \
            -DHDF5_BUILD_HL_TOOLS=OFF \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          cmake --install . --prefix install

      - name: Build HDF5 (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: build/hdf5
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1_14_$($env:HDF5_VERSION.Split('.')[2]).tar.gz" -OutFile hdf5.tar.gz
          New-Item -ItemType Directory -Force -Path src | Out-Null
          tar -xf hdf5.tar.gz -C src --strip-components=1
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake ../src -A ${{ matrix.cmake_arch }} `
            "-DBUILD_SHARED_LIBS=ON" `
            "-DHDF5_BUILD_TOOLS=ON" `
            "-DBUILD_TESTING=OFF" `
            "-DHDF5_BUILD_TESTING=OFF" `
            "-DHDF5_BUILD_EXAMPLES=OFF" `
            "-DHDF5_BUILD_HL_TOOLS=OFF" `
            "-DZLIB_INCLUDE_DIR=C:/Program Files/zlib/include" `
            "-DZLIB_LIBRARY=C:/Program Files/zlib/lib/zlib.lib" `
            "-DCMAKE_INSTALL_PREFIX=$PWD/install" `
            "-DCMAKE_BUILD_TYPE=Release"
          cmake --build . --config Release --target install

      ###########################################################################
      # NETCDF-C SERIAL BUILD
      ###########################################################################

      - name: Build netCDF-C (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: netcdf-c
        run: |
          set -e
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DNETCDF_ENABLE_HDF5=ON \
            -DHDF5_ROOT="${{ github.workspace }}/build/hdf5/build/install" \
            -DENABLE_DAP=ON \
            -DENABLE_NCZARR=ON \
            -DENABLE_BYTERANGE=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix curl 2>/dev/null || echo '')" \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_BUILD_TYPE=Release          
          cmake --build . --config Release -- -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
          cmake --install . --prefix install

      - name: Build netCDF-C (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: netcdf-c
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake .. -A ${{ matrix.cmake_arch }} `
            "-DBUILD_SHARED_LIBS=ON" `
            "-DNETCDF_ENABLE_HDF5=ON" `
            "-DHDF5_ROOT=${{ github.workspace }}/build/hdf5/build/install" `
            "-DENABLE_DAP=ON" `
            "-DENABLE_NCZARR=ON" `
            "-DENABLE_BYTERANGE=ON" `
            "-DCURL_INCLUDE_DIR=C:/Program Files/curl/include" `
            "-DCURL_LIBRARY=C:/Program Files/curl/lib/libcurl.lib" `
            "-DCMAKE_INSTALL_PREFIX=$PWD/install" `
            "-DCMAKE_BUILD_TYPE=Release"
          cmake --build . --config Release --target install


      ###########################################################################
      # PACKAGE ARTIFACTS
      ###########################################################################

      - name: Package artifacts (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          mkdir -p artifacts
          tar -czf artifacts/netcdf-${UNIDATA_TAG}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz -C netcdf-c/build/install .

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "netcdf-c/build/install/*" -DestinationPath "artifacts/netcdf-$env:UNIDATA_TAG-${{ matrix.os }}-${{ matrix.arch }}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netcdf-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          files: downloaded/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
