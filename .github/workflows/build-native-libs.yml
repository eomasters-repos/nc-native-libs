name: Build netCDF-C (netCDF-4 + Parallel) from Unidata tag and attach to release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      unidata_tag:
        description: 'Unidata/netcdf-c tag to build (e.g. v4.9.0). If empty, uses pushed tag.'
        required: false
        default: ''
      hdf5_version:
        description: 'HDF5 version to build (e.g. 1.14.2)'
        required: false
        default: '1.14.2'
      pnetcdf_version:
        description: 'PnetCDF version to build (e.g. 1.14.2)'
        required: false
        default: '1.14.2'

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            cmake_arch: x86_64
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            cmake_arch: aarch64
          - runner: macos-latest
            os: macos
            arch: x64
            cmake_arch: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            cmake_arch: arm64
          - runner: windows-latest
            os: windows
            arch: x64
            cmake_arch: x64
          - runner: windows-latest
            os: windows
            arch: arm64
            cmake_arch: ARM64

    env:
      HDF5_VERSION: ${{ github.event.inputs.hdf5_version || '1.14.2' }}
      PNETCDF_VERSION: ${{ github.event.inputs.pnetcdf_version || '1.14.2' }}
      UNIDATA_TAG: ${{ github.event.inputs.unidata_tag || github.ref_name }}

    steps:
      - name: Checkout this repository (workflow)
        uses: actions/checkout@v4

      - name: Show chosen versions (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          echo "Unidata tag: $UNIDATA_TAG"
          echo "HDF5 version: $HDF5_VERSION"
          echo "PnetCDF version: $PNETCDF_VERSION"
          echo "Matrix: ${{ matrix.os }} / ${{ matrix.arch }}"

      - name: Show chosen versions (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Unidata tag: $env:UNIDATA_TAG"
          Write-Host "HDF5 version: $env:HDF5_VERSION"
          Write-Host "PnetCDF version: $env:PNETCDF_VERSION"
          Write-Host "Matrix: ${{ matrix.os }} / ${{ matrix.arch }}"

      - name: Fetch Unidata/netcdf-c at tag (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -e
          echo "Cloning Unidata/netcdf-c tag: $UNIDATA_TAG"
          rm -rf unidata-netcdf-c
          git clone --depth 1 --branch "$UNIDATA_TAG" https://github.com/Unidata/netcdf-c.git unidata-netcdf-c
          cd unidata-netcdf-c
          git submodule update --init --recursive || true
          echo "Checked out Unidata/netcdf-c at $UNIDATA_TAG"

      - name: Fetch Unidata/netcdf-c at tag (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Cloning Unidata/netcdf-c tag: $env:UNIDATA_TAG"
          Remove-Item -Recurse -Force unidata-netcdf-c -ErrorAction SilentlyContinue
          git clone --depth 1 --branch $env:UNIDATA_TAG https://github.com/Unidata/netcdf-c.git unidata-netcdf-c
          Set-Location unidata-netcdf-c
          git submodule update --init --recursive -ErrorAction SilentlyContinue
          Write-Host "Checked out Unidata/netcdf-c at $env:UNIDATA_TAG"

      - name: Install common tools (Linux/macOS)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake ninja-build pkg-config wget tar libcurl4-openssl-dev zlib1g-dev libssl-dev
            sudo apt-get install -y libopenmpi-dev openmpi-bin ccache
          else
            brew update
            brew install cmake ninja open-mpi wget pkg-config zlib curl ccache
          fi

      - name: Install MS-MPI and tools on Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install -y microsoft-mpi
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install -y ccache

      - name: Restore HDF5 cache
        id: restore_hdf5_cache
        uses: actions/cache@v4
        with:
          path: |
            unidata-netcdf-c/deps/build-hdf5/install
            unidata-netcdf-c/deps/build-hdf5
          key: hdf5-${{ matrix.os }}-${{ matrix.arch }}-${{ env.HDF5_VERSION }}-${{ env.UNIDATA_TAG }}
          restore-keys: |
            hdf5-${{ matrix.os }}-${{ matrix.arch }}-${{ env.HDF5_VERSION }}-
            hdf5-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Build and install HDF5 (parallel) if cache miss (Unix)
        if: steps.restore_hdf5_cache.outputs.cache-hit != 'true' && matrix.os != 'windows'
        shell: bash
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/deps
        run: |
          set -e
          mkdir -p $PWD/hdf5-src
          cd $PWD
          HDF5_TAR="hdf5-${HDF5_VERSION}.tar.gz"
          wget -q https://support.hdfgroup.org/ftp/HDF5/releases/hdf5-1.14/hdf5-${HDF5_VERSION}/src/${HDF5_TAR}
          tar xf ${HDF5_TAR} -C hdf5-src --strip-components=1
          mkdir -p build-hdf5 && cd build-hdf5
          cmake ../hdf5-src -G Ninja -DBUILD_SHARED_LIBS=ON -DHDF5_BUILD_TOOLS=ON -DHDF5_ENABLE_PARALLEL=ON -DCMAKE_INSTALL_PREFIX=$PWD/install -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          cmake --install . --prefix install
          echo "HDF5 installed to $(pwd)/install"

      - name: Build and install HDF5 (parallel) if cache miss (Windows)
        if: steps.restore_hdf5_cache.outputs.cache-hit != 'true' && matrix.os == 'windows'
        shell: pwsh
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/deps
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path hdf5-src -Force | Out-Null
          $tar = "hdf5-$env:HDF5_VERSION.tar.gz"
          $url = "https://support.hdfgroup.org/ftp/HDF5/releases/hdf5-1.14/hdf5-$env:HDF5_VERSION/src/$tar"
          Invoke-WebRequest -Uri $url -OutFile $tar
          tar -xf $tar -C hdf5-src --strip-components=1
          New-Item -ItemType Directory -Path build-hdf5 -Force | Out-Null
          Set-Location build-hdf5
          cmake ../hdf5-src -A ${{ matrix.cmake_arch }} -DBUILD_SHARED_LIBS=ON -DHDF5_BUILD_TOOLS=ON -DHDF5_ENABLE_PARALLEL=ON -DCMAKE_INSTALL_PREFIX=$PWD/install -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --target install
          Write-Host "HDF5 installed to $(Get-Location)/install"

      - name: Restore PnetCDF cache
        id: restore_pnetcdf_cache
        uses: actions/cache@v4
        with:
          path: |
            unidata-netcdf-c/deps/build-pnetcdf/install
            unidata-netcdf-c/deps/build-pnetcdf
          key: pnetcdf-${{ matrix.os }}-${{ matrix.arch }}-${{ env.PNETCDF_VERSION }}-${{ env.UNIDATA_TAG }}
          restore-keys: |
            pnetcdf-${{ matrix.os }}-${{ matrix.arch }}-${{ env.PNETCDF_VERSION }}-
            pnetcdf-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Build and install PnetCDF (classic parallel) if cache miss (Unix)
        if: steps.restore_pnetcdf_cache.outputs.cache-hit != 'true' && matrix.os != 'windows'
        shell: bash
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/deps
        run: |
          set -e
          PNET_TAR="pnetcdf-${PNETCDF_VERSION}.tar.gz"
          wget -q https://parallel-netcdf.github.io/Release/pnetcdf-${PNETCDF_VERSION}.tar.gz -O ${PNET_TAR}
          tar xf ${PNET_TAR}
          mkdir -p build-pnetcdf && cd build-pnetcdf
          cmake ../pnetcdf-${PNETCDF_VERSION} -G Ninja -DCMAKE_INSTALL_PREFIX=$PWD/install -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          cmake --install . --prefix install
          echo "PnetCDF installed to $(pwd)/install"

      - name: Build and install PnetCDF (classic parallel) if cache miss (Windows)
        if: steps.restore_pnetcdf_cache.outputs.cache-hit != 'true' && matrix.os == 'windows'
        shell: pwsh
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/deps
        run: |
          $ErrorActionPreference = 'Stop'
          $tar = "pnetcdf-$env:PNETCDF_VERSION.tar.gz"
          Invoke-WebRequest -Uri "https://parallel-netcdf.github.io/Release/pnetcdf-$env:PNETCDF_VERSION.tar.gz" -OutFile $tar
          tar -xf $tar
          New-Item -ItemType Directory -Path build-pnetcdf -Force | Out-Null
          Set-Location build-pnetcdf
          cmake ../pnetcdf-$env:PNETCDF_VERSION -A ${{ matrix.cmake_arch }} -DCMAKE_INSTALL_PREFIX=$PWD/install -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=OFF
          cmake --build . --config Release --target install
          Write-Host "PnetCDF installed to $(Get-Location)/install"

      - name: Restore netCDF build cache
        id: restore_netcdf_cache
        uses: actions/cache@v4
        with:
          path: |
            unidata-netcdf-c/build/install
            unidata-netcdf-c/build
            ~/.ccache
          key: netcdf-${{ matrix.os }}-${{ matrix.arch }}-${{ env.UNIDATA_TAG }}
          restore-keys: |
            netcdf-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Configure netCDF-C with HDF5 and Parallel I/O (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: ${{ github.workspace }}/unidata-netcdf-c
        run: |
          set -e
          mkdir -p build && cd build
          HDF5_ROOT="${{ github.workspace }}/unidata-netcdf-c/deps/build-hdf5/install"
          PNETCDF_ROOT="${{ github.workspace }}/unidata-netcdf-c/deps/build-pnetcdf/install"
          cmake .. -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DNETCDF_ENABLE_HDF5=ON \
            -DHDF5_ROOT="$HDF5_ROOT" \
            -DNETCDF_ENABLE_PARALLEL=ON \
            -DPnetCDF_ROOT="$PNETCDF_ROOT" \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure netCDF-C with HDF5 and Parallel I/O (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: ${{ github.workspace }}/unidata-netcdf-c
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path build -Force | Out-Null
          Set-Location build
          $HDF5_ROOT = Join-Path $PSScriptRoot "deps/build-hdf5/install"
          $PNETCDF_ROOT = Join-Path $PSScriptRoot "deps/build-pnetcdf/install"
          cmake .. -A ${{ matrix.cmake_arch }} `
            -DBUILD_SHARED_LIBS=ON `
            -DNETCDF_ENABLE_HDF5=ON `
            -DHDF5_ROOT="$HDF5_ROOT" `
            -DNETCDF_ENABLE_PARALLEL=ON `
            -DPnetCDF_ROOT="$PNETCDF_ROOT" `
            -DCMAKE_INSTALL_PREFIX=$PWD/install `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build and install netCDF-C (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/build
        run: |
          set -e
          cmake --build . --config Release -- -j$(nproc || sysctl -n hw.ncpu)
          cmake --install . --prefix install

      - name: Build and install netCDF-C (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: ${{ github.workspace }}/unidata-netcdf-c/build
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --build . --config Release --target install

      - name: Save netCDF cache (ensure cache key is created)
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            unidata-netcdf-c/build/install
            unidata-netcdf-c/build
            ~/.ccache
          key: netcdf-${{ matrix.os }}-${{ matrix.arch }}-${{ env.UNIDATA_TAG }}

      - name: Package artifacts (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cd ${{ github.workspace }}/unidata-netcdf-c/build/install
          tar -czf $GITHUB_WORKSPACE/artifacts/netcdf-${UNIDATA_TAG}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz *

      - name: Package artifacts (Windows
