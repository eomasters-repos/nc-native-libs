name: Build netCDF-C (HDF5 serial)
env:
  ZLIB_VERSION: "1.3.2"
  CURL_VERSION: "8.20.0"
  HDF5_VERSION: "1.14.2"
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      netcdf_tag:
        description: "Tag of Unidata/netcdf-c to build"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            cmake_arch: x86_64
#          - runner: ubuntu-24.04-arm
#            os: linux
#            arch: arm64
#            cmake_arch: aarch64
#          - runner: macos-13
#            os: macos
#            arch: x64
#            cmake_arch: x86_64
#          - runner: macos-latest
#            os: macos
#            arch: arm64
#            cmake_arch: arm64
#          - runner: windows-latest
#            os: windows
#            arch: x64
#            cmake_arch: x64
         # Windows ARM64 disabled — HDF5 cannot be built
         # - runner: windows-latest
         #   os: windows
         #   arch: arm64
         #   cmake_arch: ARM64

    env:
      NETCDF_TAG: ${{ github.event.inputs.netcdf_tag || github.ref_name }}

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Clone Unidata/netcdf-c
        shell: bash
        run: |
          git clone --depth 1 --branch "$NETCDF_TAG" https://github.com/Unidata/netcdf-c.git netcdf-c

      - name: Prepare build folders
        shell: bash
        run: |
          mkdir -p build/hdf5 build/netcdf

      ###########################################################################
      # ZLIB BUILD
      ###########################################################################          

      - name: Build zlib (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
      
          curl -sSLf "https://github.com/madler/zlib/archive/refs/tags/v${ZLIB_VERSION}.tar.gz" -o zlib.tar.gz
          mkdir -p zlib-src
          tar -xf zlib.tar.gz -C zlib-src --strip-components=1
      
          mkdir -p zlib-build
          cd zlib-build
      
          cmake ../zlib-src \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DZLIB_BUILD_SHARED=ON \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            --log-level=WARNING
      
          cmake --build . --target install -- -s
      
          echo "ZLIB_ROOT=$PWD/install" >> $GITHUB_ENV
          echo "ZLIB_DIR=$PWD/install/lib/cmake/zlib" >> $GITHUB_ENV
          echo "ZLIB_INCLUDE=$PWD/install/include" >> $GITHUB_ENV
      
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "ZLIB_LIBRARY=$PWD/install/lib/libz.so" >> $GITHUB_ENV
            echo "ZLIB_STATIC_LIBRARY=$PWD/install/lib/libz.a" >> $GITHUB_ENV
            echo "ZLIB_SHARED_LIBRARY=$PWD/install/lib/libz.so" >> $GITHUB_ENV
          else
            echo "ZLIB_LIBRARY=$PWD/install/lib/libz.dylib" >> $GITHUB_ENV
            echo "ZLIB_STATIC_LIBRARY=$PWD/install/lib/libz.a" >> $GITHUB_ENV
            echo "ZLIB_SHARED_LIBRARY=$PWD/install/lib/libz.dylib" >> $GITHUB_ENV
          fi    

      - name: Build zlib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
      
          $url = "https://github.com/madler/zlib/archive/refs/tags/v$env:ZLIB_VERSION.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile "zlib.tar.gz"          
          mkdir zlib-src | Out-Null
          tar -xf zlib.tar.gz -C zlib-src --strip-components=1
      
          New-Item -ItemType Directory -Force -Path zlib-build | Out-Null
          Set-Location zlib-build
          $installPrefix = "$PWD\install"

          cmake ../zlib-src -A x64 `
            "-DBUILD_SHARED_LIBS=OFF" `
            "-DCMAKE_BUILD_TYPE=Release" `
            "--log-level=WARNING"

          cmake --build . --config Release -- /verbosity:quiet /nologo
          cmake --install . --config Release --prefix $installPrefix

          $zlibLibCandidates = @(
            "$installPrefix\lib\zs.lib",
            "$installPrefix\lib\z.lib",
            "$installPrefix\lib\zlibstatic.lib",
            "$installPrefix\lib\zlib.lib"
          )
          $zlibLib = $zlibLibCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $zlibLib) {
            Get-ChildItem -LiteralPath "$installPrefix\lib" -ErrorAction SilentlyContinue
            throw "Could not find installed zlib static library under $installPrefix\lib"
          }

          echo "ZLIB_ROOT=$installPrefix" >> $env:GITHUB_ENV
          echo "ZLIB_DIR=$installPrefix\lib\cmake\zlib" >> $env:GITHUB_ENV
          echo "ZLIB_INCLUDE=$installPrefix\include" >> $env:GITHUB_ENV
          echo "ZLIB_LIBRARY=$zlibLib" >> $env:GITHUB_ENV
          echo "ZLIB_STATIC_LIBRARY=$installPrefix\lib\zs.lib" >> $env:GITHUB_ENV
          echo "ZLIB_SHARED_LIBRARY=$installPrefix\lib\z.lib" >> $env:GITHUB_ENV

      ###########################################################################
      # CURL BUILD
      ###########################################################################
      
      - name: Build curl (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
      
          curl -sSL "https://curl.se/download/curl-$CURL_VERSION.tar.gz" -o curl.tar.gz
          mkdir -p curl-src
          tar -xf curl.tar.gz -C curl-src --strip-components=1
      
          mkdir -p curl-build
          cd curl-build
      
          TLS_BACKEND="-DCURL_USE_OPENSSL=ON"
      
          cmake ../curl-src \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DBUILD_SHARED_LIBS=OFF \
            -DCURL_USE_LIBPSL=OFF \
            -DCURL_ZLIB=OFF \
            -DZLIB_INCLUDE_DIR=$ZLIB_INCLUDE \
            -DZLIB_LIBRARY=$ZLIB_LIBRARY \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            $TLS_BACKEND \
            --log-level=WARNING
      
          cmake --build . --target install -- -s
      
          echo "CURL_ROOT=$PWD/install" >> $GITHUB_ENV
          echo "CURL_DIR=$PWD/install/lib/cmake/CURL" >> $GITHUB_ENV
          echo "CURL_INCLUDE=$PWD/install/include" >> $GITHUB_ENV
          echo "CURL_LIBRARY=$PWD/install/lib/libcurl.a" >> $GITHUB_ENV


      - name: Build curl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
      
          $url = "https://curl.se/download/curl-$env:CURL_VERSION.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile "curl.tar.gz"
          
          # Correct: extract .tar.gz using tar, not Expand-Archive
          tar -xf curl.tar.gz
          Rename-Item "curl-$env:CURL_VERSION" curl-src
      
          New-Item -ItemType Directory -Force -Path curl-build | Out-Null
          Set-Location curl-build
      
          cmake ../curl-src -A x64 `
            "-DBUILD_SHARED_LIBS=OFF" `
            "-DCURL_USE_SCHANNEL=ON" `
            "-DCURL_USE_OPENSSL=OFF" `
            "-DCURL_USE_LIBPSL=OFF" `
            "-DCURL_ZLIB=OFF" `
            "-DZLIB_INCLUDE_DIR=$env:ZLIB_INCLUDE" `
            "-DZLIB_LIBRARY=$env:ZLIB_LIBRARY" `
            "-DCMAKE_INSTALL_PREFIX=$PWD/install" `
            "-DCMAKE_BUILD_TYPE=Release" `
            "--log-level=WARNING"
      
          cmake --build . --config Release --target install -- /verbosity:quiet /nologo

          echo "CURL_ROOT=$PWD/install" >> $env:GITHUB_ENV
          echo "CURL_DIR=$PWD/install/lib/cmake/CURL" >> $env:GITHUB_ENV
          echo "CURL_INCLUDE=$PWD/install/include" >> $env:GITHUB_ENV
          echo "CURL_LIBRARY=$PWD/install/lib/libcurl.lib" >> $env:GITHUB_ENV

      ###########################################################################
      # HDF5 SERIAL BUILD
      ###########################################################################

      - name: Build HDF5 (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: build/hdf5
        run: |
          set -e
          wget -q -O hdf5.tar.gz \
            https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1_14_${HDF5_VERSION##*.}.tar.gz
          mkdir src && tar xf hdf5.tar.gz --strip-components=1 -C src
          mkdir build && cd build
          cmake ../src -G Ninja "--log-level=WARNING"\
            -DBUILD_SHARED_LIBS=ON \
            -DHDF5_BUILD_TOOLS=OFF \
            -DBUILD_TESTING=OFF \
            -DHDF5_BUILD_TESTING=OFF \
            -DHDF5_BUILD_EXAMPLES=OFF \
            -DHDF5_BUILD_HL_TOOLS=OFF \
            -DHDF5_ENABLE_Z_LIB_SUPPORT=ON \
            -DHDF5_ENABLE_ZLIB_SUPPORT=ON \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_PREFIX_PATH="$ZLIB_ROOT" \
            -DZLIB_ROOT=$ZLIB_ROOT \
            -DZLIB_DIR=$ZLIB_DIR \
            -DZLIB_INCLUDE_DIR=$ZLIB_INCLUDE \
            -DZLIB_LIBRARY=$ZLIB_LIBRARY \
            -DZLIB_LIBRARIES=$ZLIB_LIBRARY \
            -DZLIB_STATIC_LIBRARY=$ZLIB_STATIC_LIBRARY \
            -DZLIB_SHARED_LIBRARY=$ZLIB_SHARED_LIBRARY \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          cmake --install . --prefix install

      - name: Build HDF5 (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: build/hdf5
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1_14_$($env:HDF5_VERSION.Split('.')[2]).tar.gz" -OutFile hdf5.tar.gz
          New-Item -ItemType Directory -Force -Path src | Out-Null
          tar -xf hdf5.tar.gz -C src --strip-components=1
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake ../src -A ${{ matrix.cmake_arch }} "--log-level=WARNING"`
            "-DBUILD_SHARED_LIBS=ON" `
            "-DHDF5_BUILD_TOOLS=OFF" `
            "-DBUILD_TESTING=OFF" `
            "-DHDF5_BUILD_TESTING=OFF" `
            "-DHDF5_BUILD_EXAMPLES=OFF" `
            "-DHDF5_BUILD_HL_TOOLS=OFF" `
            "-DHDF5_ENABLE_Z_LIB_SUPPORT=ON" `
            "-DHDF5_ENABLE_ZLIB_SUPPORT=ON" `
            "-DCMAKE_PREFIX_PATH=$env:ZLIB_ROOT" `
            "-DZLIB_ROOT=$env:ZLIB_ROOT" `
            "-DZLIB_DIR=$env:ZLIB_DIR" `
            "-DZLIB_INCLUDE_DIR=$env:ZLIB_INCLUDE" `
            "-DZLIB_LIBRARY=$env:ZLIB_LIBRARY" `
            "-DZLIB_LIBRARIES=$env:ZLIB_LIBRARY" `
            "-DZLIB_STATIC_LIBRARY=$env:ZLIB_STATIC_LIBRARY" `
            "-DZLIB_SHARED_LIBRARY=$env:ZLIB_SHARED_LIBRARY" `
            "-DCMAKE_INSTALL_PREFIX=$PWD/install" `
            "-DCMAKE_BUILD_TYPE=Release"
          cmake --build . --config Release --target install -- /verbosity:minimal

      ###########################################################################
      # NETCDF-C SERIAL BUILD
      ###########################################################################

      - name: Build netCDF-C (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: netcdf-c
        run: |
          set -e
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DNETCDF_ENABLE_HDF5=ON \
            -DHDF5_ROOT="${{ github.workspace }}/build/hdf5/build/install" \
            -DNETCDF_ENABLE_DAP=ON \
            -DNETCDF_ENABLE_NCZARR=ON \
            -DNETCDF_ENABLE_BYTERANGE=ON \
            -DCMAKE_PREFIX_PATH="$CURL_ROOT;$ZLIB_ROOT;${{ github.workspace }}/build/hdf5/build/install" \
            -DCURL_ROOT="$CURL_ROOT" \
            -DCURL_DIR="$CURL_DIR" \
            -DCURL_INCLUDE_DIR=$CURL_INCLUDE \
            -DCURL_INCLUDE_DIRS=$CURL_INCLUDE \
            -DCURL_LIBRARY=$CURL_LIBRARY \
            -DZLIB_INCLUDE_DIR=$ZLIB_INCLUDE \
            -DZLIB_LIBRARY=$ZLIB_LIBRARY \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }} \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_BUILD_TYPE=Release          
          cmake --build . --config Release -- -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)
          cmake --install . --prefix install

      - name: Build netCDF-C (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: netcdf-c
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake .. -A ${{ matrix.cmake_arch }} "--log-level=WARNING"`
            "-DBUILD_SHARED_LIBS=ON" `
            "-DNETCDF_ENABLE_HDF5=ON" `
            "-DENABLE_TESTS=OFF" `
            "-DHDF5_ROOT=${{ github.workspace }}/build/hdf5/build/install" `
            "-DNETCDF_ENABLE_DAP=ON" `
            "-DNETCDF_ENABLE_NCZARR=ON" `
            "-DNETCDF_ENABLE_BYTERANGE=ON" `
            "-DCMAKE_PREFIX_PATH=$env:CURL_ROOT;$env:ZLIB_ROOT;${{ github.workspace }}/build/hdf5/build/install" `
            "-DCURL_ROOT=$env:CURL_ROOT" `
            "-DCURL_DIR=$env:CURL_DIR" `
            "-DCURL_INCLUDE_DIR=$env:CURL_INCLUDE" `
            "-DCURL_INCLUDE_DIRS=$env:CURL_INCLUDE" `
            "-DCURL_LIBRARY=$env:CURL_LIBRARY" `
            "-DZLIB_LIBRARY=$env:ZLIB_LIBRARY" `
            "-DZLIB_INCLUDE_DIR=$env:ZLIB_INCLUDE" `
            "-DCMAKE_INSTALL_PREFIX=$PWD/install" `
            "-DCMAKE_BUILD_TYPE=Release"
          cmake --build . --config Release --target install -- /verbosity:minimal


      ###########################################################################
      # PACKAGE ARTIFACTS
      ###########################################################################

      - name: Package artifacts (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          mkdir -p artifacts
          tar -czf artifacts/netcdf-${NETCDF_TAG}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz -C netcdf-c/build/install .

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "netcdf-c/build/install/*" -DestinationPath "artifacts/netcdf-$env:NETCDF_TAG-${{ matrix.os }}-${{ matrix.arch }}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netcdf-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          files: downloaded/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
