name: Build NetCDF-C (full-feature-shared)
on:
  workflow_dispatch:
    inputs:
      netcdf_tag:
        description: "Tag/version of Unidata/netcdf-c build (e.g., v4.10.0)"
        required: true

env:
  BUILD_PROFILE: "full-feature-shared"
  ZLIB_VERSION: "1.3.2"
  CURL_VERSION: "8.20.0"
  HDF5_VERSION: "1.14.2"
  NETCDF_TAG: ${{ github.event.inputs.netcdf_tag }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            cmake_arch: x86_64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            cmake_arch: aarch64
          - runner: macos-latest
            os: macos
            arch: arm64
            cmake_arch: arm64
          - runner: windows-latest
            os: windows
            arch: x64
            cmake_arch: x64
#          Outdated and runners take too long to start (not even sure if it will build)
#          - runner: macos‑15‑intel
#            os: macos
#            arch: x64
#            cmake_arch: x86_64
#          Windows ARM64 disabled — HDF5 cannot be built
#          - runner: windows-latest
#            os: windows
#            arch: arm64
#            cmake_arch: ARM64

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Clone Unidata/netcdf-c
        shell: bash
        run: |
          git clone --depth 1 --branch "$NETCDF_TAG" https://github.com/Unidata/netcdf-c.git netcdf-c

      - name: Prepare build folders
        shell: bash
        run: |
          mkdir -p build/hdf5 build/netcdf

      ###########################################################################
      # ZLIB BUILD
      ###########################################################################          

      - name: Build zlib (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: bash .github/scripts/build-zlib-unix.sh

      - name: Build zlib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: .\.github\scripts\build-zlib-windows.ps1

      ###########################################################################
      # CURL BUILD
      ###########################################################################
      
      - name: Build curl (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: bash .github/scripts/build-curl-unix.sh


      - name: Build curl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: .\.github\scripts\build-curl-windows.ps1

      ###########################################################################
      # HDF5 SERIAL BUILD
      ###########################################################################

      - name: Build HDF5 (Unix)
        if: matrix.os != 'windows'
        shell: bash
        env:
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: bash .github/scripts/build-hdf5-unix.sh

      - name: Build HDF5 (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: .\.github\scripts\build-hdf5-windows.ps1

      ###########################################################################
      # NETCDF-C SERIAL BUILD
      ###########################################################################

      - name: Build netCDF-C (Unix)
        if: matrix.os != 'windows'
        shell: bash
        env:
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: bash .github/scripts/build-netcdf-unix.sh

      - name: Build netCDF-C (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          CMAKE_ARCH: ${{ matrix.cmake_arch }}
        run: .\.github\scripts\build-netcdf-windows.ps1


      ###########################################################################
      # PACKAGE ARTIFACTS
      ###########################################################################

      - name: Package artifacts (Unix)
        if: matrix.os != 'windows'
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: bash .github/scripts/package-unix.sh

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: .\.github\scripts\package-windows.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netcdf-${{ env.BUILD_PROFILE }}-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset existing release/tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if gh release view "$NETCDF_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$NETCDF_TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
          else
            echo "No existing release for $NETCDF_TAG"
            git push origin ":refs/tags/$NETCDF_TAG" 2>/dev/null || true
          fi
          git tag -d "$NETCDF_TAG" 2>/dev/null || true
          git tag "$NETCDF_TAG" "$GITHUB_SHA" -f
          git push origin "refs/tags/$NETCDF_TAG" --force

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Debug downloaded files
        shell: bash
        run: |
          set -euo pipefail
          echo "Downloaded files:"
          find downloaded -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NETCDF_TAG }}
          overwrite_files: true
          files: |
            downloaded/**/*.tar.gz
            downloaded/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Assets for $NETCDF_TAG:"
          gh release view "$NETCDF_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name'
