name: Build netCDF-C (HDF5 + Parallel + PnetCDF)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      unidata_tag:
        description: "Tag of Unidata/netcdf-c to build"
        required: false
        default: ""
      hdf5_version:
        description: "HDF5 version (1.14.x only!)"
        required: false
        default: "1.14.2"
      pnetcdf_version:
        description: "PnetCDF version"
        required: false
        default: "1.14.2"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            cmake_arch: x86_64
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            cmake_arch: aarch64
          - runner: macos-latest
            os: macos
            arch: x64
            cmake_arch: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            cmake_arch: arm64
          - runner: windows-latest
            os: windows
            arch: x64
            cmake_arch: x64
          - runner: windows-latest
            os: windows
            arch: arm64
            cmake_arch: ARM64

    env:
      HDF5_VERSION: ${{ github.event.inputs.hdf5_version || '1.14.2' }}
      PNETCDF_VERSION: ${{ github.event.inputs.pnetcdf_version || '1.14.2' }}
      UNIDATA_TAG: ${{ github.event.inputs.unidata_tag || github.ref_name }}

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Clone Unidata/netcdf-c
        shell: bash
        run: |
          git clone --depth 1 --branch "$UNIDATA_TAG" https://github.com/Unidata/netcdf-c.git netcdf-c

      - name: Prepare build folders
        shell: bash
        run: |
          mkdir -p build/hdf5 build/pnetcdf build/netcdf

      ###########################################################################
      # INSTALL MPI
      ###########################################################################

      - name: Install MPI (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev

      - name: Install MPI (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          brew install open-mpi

      - name: Install MPI (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install -y microsoft-mpi
          choco install -y microsoft-mpi-sdk
          $env:MPI_HOME = "C:\Program Files (x86)\Microsoft SDKs\MPI"
          echo "MPI_HOME=$env:MPI_HOME" | Out-File -FilePath $env:GITHUB_ENV -Append

      ###########################################################################
      # HDF5 BUILD
      ###########################################################################

      - name: Build HDF5 (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: build/hdf5
        run: |
          set -e
          wget -q -O hdf5.tar.gz \
            https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1_14_${HDF5_VERSION##*.}.tar.gz
          mkdir src && tar xf hdf5.tar.gz --strip-components=1 -C src
          mkdir build && cd build
          cmake ../src -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DHDF5_BUILD_TOOLS=ON \
            -DHDF5_ENABLE_PARALLEL=ON \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          cmake --install . --prefix install

      - name: Build HDF5 (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: build/hdf5
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5-1_14_$($env:HDF5_VERSION.Split('.')[2]).tar.gz" -OutFile hdf5.tar.gz
          New-Item -ItemType Directory -Force -Path src | Out-Null
          tar -xf hdf5.tar.gz -C src --strip-components=1
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake ../src -A ${{ matrix.cmake_arch }} `
            -DBUILD_SHARED_LIBS=ON `
            -DHDF5_BUILD_TOOLS=ON `
            -DHDF5_ENABLE_PARALLEL=ON `
            -DCMAKE_INSTALL_PREFIX="$PWD/install" `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --target install

      ###########################################################################
      # PNETCDF BUILD
      ###########################################################################

      - name: Build PnetCDF (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: build/pnetcdf
        run: |
          set -e
          wget -q -O pnetcdf.tar.gz \
            https://parallel-netcdf.github.io/Release/pnetcdf-${PNETCDF_VERSION}.tar.gz
          mkdir src && tar xf pnetcdf.tar.gz -C src --strip-components=1
          mkdir build && cd build
          cmake ../src -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          cmake --install . --prefix install

      - name: Build PnetCDF (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: build/pnetcdf
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://parallel-netcdf.github.io/Release/pnetcdf-$env:PNETCDF_VERSION.tar.gz" -OutFile pnetcdf.tar.gz
          New-Item -ItemType Directory -Force -Path src | Out-Null
          tar -xf pnetcdf.tar.gz -C src --strip-components=1
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake ../src -A ${{ matrix.cmake_arch }} `
            -DCMAKE_INSTALL_PREFIX="$PWD/install" `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_TESTS=OFF
          cmake --build . --config Release --target install

      ###########################################################################
      # NETCDF-C BUILD
      ###########################################################################

      - name: Build netCDF-C (Unix)
        if: matrix.os != 'windows'
        shell: bash
        working-directory: netcdf-c
        run: |
          set -e
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DBUILD_SHARED_LIBS=ON \
            -DNETCDF_ENABLE_HDF5=ON \
            -DHDF5_ROOT="${{ github.workspace }}/build/hdf5/build/install" \
            -DNETCDF_ENABLE_PARALLEL=ON \
            -DPnetCDF_ROOT="${{ github.workspace }}/build/pnetcdf/build/install" \
            -DCMAKE_INSTALL_PREFIX=$PWD/install \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -- -j$(nproc)
          cmake --install . --prefix install

      - name: Build netCDF-C (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        working-directory: netcdf-c
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake .. -A ${{ matrix.cmake_arch }} `
            -DBUILD_SHARED_LIBS=ON `
            -DNETCDF_ENABLE_HDF5=ON `
            -DHDF5_ROOT="${{ github.workspace }}/build/hdf5/build/install" `
            -DNETCDF_ENABLE_PARALLEL=ON `
            -DPnetCDF_ROOT="${{ github.workspace }}/build/pnetcdf/build/install" `
            -DCMAKE_INSTALL_PREFIX="$PWD/install" `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --target install

      ###########################################################################
      # PACKAGE ARTIFACTS
      ###########################################################################

      - name: Package artifacts (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          mkdir -p artifacts
          tar -czf artifacts/netcdf-${UNIDATA_TAG}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz -C netcdf-c/build/install .

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path "netcdf-c/build/install/*" -DestinationPath "artifacts/netcdf-$env:UNIDATA_TAG-${{ matrix.os }}-${{ matrix.arch }}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netcdf-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          files: downloaded/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
